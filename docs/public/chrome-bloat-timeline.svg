<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="340" fill="#1a1a2e" rx="12"/>
  <text x="400" y="35" fill="#e0e0e0" font-size="18" font-weight="bold" text-anchor="middle">Chrome's Feature Creep Over the Years</text>
  <!-- Timeline line -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#4a4a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- 2008 -->
  <circle cx="120" cy="180" r="8" fill="#4CAF50"/>
  <text x="120" y="210" fill="#a0a0b0" font-size="11" text-anchor="middle">2008</text>
  <text x="120" y="155" fill="#e0e0e0" font-size="10" text-anchor="middle">Fast &amp;</text>
  <text x="120" y="167" fill="#e0e0e0" font-size="10" text-anchor="middle">Simple</text>
  <!-- 2012 -->
  <circle cx="240" cy="180" r="8" fill="#8BC34A"/>
  <text x="240" y="210" fill="#a0a0b0" font-size="11" text-anchor="middle">2012</text>
  <text x="240" y="148" fill="#e0e0e0" font-size="10" text-anchor="middle">Chrome Web</text>
  <text x="240" y="160" fill="#e0e0e0" font-size="10" text-anchor="middle">Store, Sync</text>
  <text x="240" y="172" fill="#e0e0e0" font-size="10" text-anchor="middle">Sign-in Push</text>
  <!-- 2016 -->
  <circle cx="360" cy="180" r="8" fill="#FFC107"/>
  <text x="360" y="210" fill="#a0a0b0" font-size="11" text-anchor="middle">2016</text>
  <text x="360" y="148" fill="#e0e0e0" font-size="10" text-anchor="middle">Heavy RAM</text>
  <text x="360" y="160" fill="#e0e0e0" font-size="10" text-anchor="middle">Usage, Auto</text>
  <text x="360" y="172" fill="#e0e0e0" font-size="10" text-anchor="middle">Sign-in</text>
  <!-- 2020 -->
  <circle cx="480" cy="180" r="8" fill="#FF9800"/>
  <text x="480" y="210" fill="#a0a0b0" font-size="11" text-anchor="middle">2020</text>
  <text x="480" y="148" fill="#e0e0e0" font-size="10" text-anchor="middle">Privacy Sandbox</text>
  <text x="480" y="160" fill="#e0e0e0" font-size="10" text-anchor="middle">Manifest V3</text>
  <text x="480" y="172" fill="#e0e0e0" font-size="10" text-anchor="middle">FLoC/Topics</text>
  <!-- 2024 -->
  <circle cx="600" cy="180" r="8" fill="#f44336"/>
  <text x="600" y="210" fill="#a0a0b0" font-size="11" text-anchor="middle">2024</text>
  <text x="600" y="141" fill="#e0e0e0" font-size="10" text-anchor="middle">Gemini AI</text>
  <text x="600" y="153" fill="#e0e0e0" font-size="10" text-anchor="middle">Tab Organizer</text>
  <text x="600" y="165" fill="#e0e0e0" font-size="10" text-anchor="middle">Ad Blocker</text>
  <text x="600" y="177" fill="#e0e0e0" font-size="10" text-anchor="middle">Nerfs</text>
  <!-- RAM bar chart at bottom -->
  <text x="400" y="250" fill="#a0a0b0" font-size="12" text-anchor="middle">Avg. RAM Usage (MB) for 5 open tabs</text>
  <rect x="105" y="268" width="30" height="15" fill="#4CAF50" rx="2"/>
  <text x="120" y="298" fill="#a0a0b0" font-size="9" text-anchor="middle">~150</text>
  <rect x="225" y="263" width="30" height="20" fill="#8BC34A" rx="2"/>
  <text x="240" y="298" fill="#a0a0b0" font-size="9" text-anchor="middle">~350</text>
  <rect x="345" y="255" width="30" height="28" fill="#FFC107" rx="2"/>
  <text x="360" y="298" fill="#a0a0b0" font-size="9" text-anchor="middle">~800</text>
  <rect x="465" y="248" width="30" height="35" fill="#FF9800" rx="2"/>
  <text x="480" y="298" fill="#a0a0b0" font-size="9" text-anchor="middle">~1.2GB</text>
  <rect x="585" y="240" width="30" height="43" fill="#f44336" rx="2"/>
  <text x="600" y="298" fill="#a0a0b0" font-size="9" text-anchor="middle">~1.8GB</text>
  <!-- Arrow indicating direction -->
  <text x="700" y="184" fill="#f44336" font-size="20">→</text>
  <text x="710" y="210" fill="#f44336" font-size="9" text-anchor="middle">worse</text>
</svg>
