<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="46" stroke="#000000" stroke-width="3" fill="none"/>
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="36" stroke="#000000" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Cardinal tick marks -->
  <line x1="50" y1="4" x2="50" y2="16" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="84" x2="50" y2="96" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="50" x2="96" y2="50" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="50" x2="16" y2="50" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <!-- Intercardinal tick marks -->
  <line x1="79" y1="21" x2="83.5" y2="16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="21" x2="16.5" y2="16.5" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="79" y1="79" x2="83.5" y2="83.5" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="79" x2="16.5" y2="83.5" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Compass needle - North (dark) -->
  <polygon points="50,14 43,50 50,44 57,50" fill="#000000"/>
  <!-- Compass needle - South (light) -->
  <polygon points="50,86 43,50 50,56 57,50" fill="#b0b0b0" stroke="#000000" stroke-width="0.5"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="2.5" fill="#000000"/>
</svg>
